<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>bingo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <meta name="description" content=""> -->
  <!-- <meta name="author" content=""> -->
  <meta name="color-scheme" content="dark">
  <!-- <link rel="icon" href="./favicon.ico"> -->
  <!-- <link rel="icon" href="./favicon.svg" type="image/svg+xml"> -->
  <!-- <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180"> -->
  <link rel="stylesheet" href="./css/application.css">
  <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body>
  <!-- <header>
    <div class="navbar navbar-dark bg-dark shadow-sm">
      <div class="container">
        <div class="d-flex align-items-center">
          <a href="/"><span class="navbar-brand text-muted"><strong>bingo</strong></span></a>
        </div>
      </div>
    </div>
  </header> -->
  <main class="py-2">
    <div class="container py-5" id="pending-load-spinner">
      <div class="d-flex justify-content-center my-5 py-5">
        <div class="spinner-border my-5">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    </div>
    <div id="wrapper" class="container px-3 pending-load">
      <div id="prompt-form">
        <div class="pt-5 pb-5">
          <h3 class="mb-3 display-2">bingo generator</h3>
          <div class="px-2 text-justify">
            this section should contain your instructions, advisories, etc. for the bingo generator.<br>
            remember to leave all text lowercase for an extra 1d8 psychic damage against english majors.
          </div>
        </div>
        <div class="py-2">
          <h3 class="mb-3 mx-2">prompt settings</h3>
          <form class="needs-validation" novalidate>
            <div class="row">
              <div class="col-12 col-lg-6 pt-2">
                <div class="container">
                  <div class="row">
                    <div class="mb-3">
                      <label for="dataset-selection" class="form-label">Prompt pool</label>
                      <select class="form-select" id="dataset-selection"></select>
                    </div>
                  </div>
                  <div class="row">
                    <div class="mb-3">
                      <label for="sensitivity-limit-selection" class="form-label">Sensitivity threshold</label>
                      <select class="form-select" id="sensitivity-limit-selection"></select>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-12 col-lg-6 pt-2">
                <div class="container">
                  <div class="row">
                    <div class="mb-3">
                      <label for="flag-selection" class="form-label">Permitted topics</label>
                      <select class="form-select" id="flag-selection" multiple size="4"></select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="row px-4 mt-2">
              <div class="col-lg-8 offset-lg-2">
                <button class="w-100 btn btn-primary zaddy btn-lg" type="submit" id="submit">build my bingo card</button>
              </div>
            </div>
            <div class="row d-flex justify-content-center align-items-center py-lg-2 py-1 mt-5 mb-3 px-4">
              <div class="col-5"><hr></div>
              <div class="col-2 text-center fw-bold fs-3">OR</div>
              <div class="col-5"><hr></div>
            </div>
            <div class="row px-2">
              <div class="col-lg-8 offset-lg-2 px-3">
                <div class="mb-3">
                  <label for="import-card-code" class="form-label">Saved bingo card code</label>
                  <textarea class="form-control" id="import-card-code" rows="3"></textarea>
                </div>
              </div>
            </div>
            <div class="row px-4 mt-2">
              <div class="col-lg-8 offset-lg-2">
                <button class="w-100 btn btn-primary zaddy btn-lg" type="submit" id="import">import a previous card</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div id="prompt-result">
        <div class="py-2 px-md-5">
          <div class="container py-2 px-md-5">
            <div class="row row-cols-5 mx-lg-5 px-lg-5 pb-2 bingo-header lizzer">
              <div class="col">
                <h3 class="fs-1 d-flex align-items-center justify-content-center">B</h3>
              </div>
              <div class="col">
                <h3 class="fs-1 d-flex align-items-center justify-content-center">I</h3>
              </div>
              <div class="col">
                <h3 class="fs-1 d-flex align-items-center justify-content-center">N</h3>
              </div>
              <div class="col">
                <h3 class="fs-1 d-flex align-items-center justify-content-center">G</h3>
              </div>
              <div class="col">
                <h3 class="fs-1 d-flex align-items-center justify-content-center">O</h3>
              </div>
            </div>
            <div class="row row-cols-5 mx-lg-5 px-lg-5" id="bingo-frame"></div>
            <div class="row mx-lg-5 px-lg-5 mt-3">
              <div class="input-group px-0">
                <button class="btn btn-secondary" type="button" id="export">Export</button>
                <textarea class="form-control" id="export-card-code" rows="2" disabled="disabled"></textarea>
                <button class="btn btn-secondary capture px-3" type="button" id="copy-export">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard my-1" viewBox="0 0 16 16">
                    <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/>
                    <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="row mx-lg-5 px-lg-5 mt-3">
              <button class="w-80 btn btn-primary zaddy btn-lg" type="submit" id="rebuild">build another</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
  <div aria-live="polite" aria-atomic="true" class="position-relative">
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  </div>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { CardUI } from './js/ui/card.js'
    const app = new CardUI();
    globalThis.app = app;
  </script>
</body>
</html>
